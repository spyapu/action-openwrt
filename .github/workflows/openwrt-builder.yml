name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential ccache clang cmake cpio curl device-tree-compiler file flex g++ gawk gcc-multilib g++-multilib gettext git libelf-dev libfuse3-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libpython3-dev libssl-dev libtool lrzsz make ninja-build pkg-config python3 python3-pip python3-setuptools rsync scons squashfs-tools subversion swig time unzip upx-ucl xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Cache OpenWrt dl
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('.config', 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-dl-

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(TZ='Asia/Shanghai' date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          OPENWRT_VERSION=$(printf '%s' "$REPO_BRANCH" | sed -E 's/^openwrt-//')
          echo "OPENWRT_VERSION=_${OPENWRT_VERSION}" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v7
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.OPENWRT_VERSION }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware (EFI image)
        uses: actions/upload-artifact@v7
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt${{ env.OPENWRT_VERSION }}_efi${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*combined-efi.img.gz
          if-no-files-found: ignore
          compression-level: 0

      - name: Upload firmware (legacy BIOS image)
        uses: actions/upload-artifact@v7
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt${{ env.OPENWRT_VERSION }}_bios${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*combined.img.gz
          if-no-files-found: ignore
          compression-level: 0

      - name: Upload firmware (sha256sums)
        uses: actions/upload-artifact@v7
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt${{ env.OPENWRT_VERSION }}_sha256${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*sha256sums*
          if-no-files-found: ignore
          compression-level: 0

      - name: Generate release tag
        id: tag
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(TZ='Asia/Shanghai' date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v3
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          keep_latest = 3

          def req(method, url):
              r = urllib.request.Request(url, method=method)
              r.add_header("Authorization", f"Bearer {token}")
              r.add_header("Accept", "application/vnd.github+json")
              r.add_header("X-GitHub-Api-Version", "2022-11-28")
              return urllib.request.urlopen(r)

          with req("GET", f"https://api.github.com/repos/{repo}/releases?per_page=100") as resp:
              releases = json.load(resp)

          old_releases = releases[keep_latest:]
          for rel in old_releases:
              rel_id = rel["id"]
              tag = rel["tag_name"]
              print(f"Deleting release {rel_id} ({tag})")
              req("DELETE", f"https://api.github.com/repos/{repo}/releases/{rel_id}").read()
              req("DELETE", f"https://api.github.com/repos/{repo}/git/refs/tags/{tag}").read()
          PY
