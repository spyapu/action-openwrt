name: OpenWrt Fast Builder

on:
  workflow_dispatch:
    inputs:
      repo_branch:
        description: OpenWrt branch to build
        required: false
        default: openwrt-25.12
        type: string
      config_file:
        description: Config file to use from the repository root
        required: false
        default: .config
        type: string
      enable_ccache:
        description: Enable ccache to speed up repeated builds
        required: false
        default: true
        type: boolean
      upload_artifacts:
        description: Upload firmware artifacts after build
        required: false
        default: true
        type: boolean
  repository_dispatch:

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.repo_branch || github.event.client_payload.repo_branch || 'openwrt-25.12' }}
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.config_file || github.event.client_payload.config_file || '.config' }}
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  ENABLE_CCACHE: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_ccache || github.event.client_payload.enable_ccache || 'true' }}
  UPLOAD_ARTIFACTS: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_artifacts || github.event.client_payload.upload_artifacts || 'true' }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential ccache clang cmake cpio curl device-tree-compiler file flex g++ gawk gcc-multilib g++-multilib gettext git libelf-dev libfuse3-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libssl-dev ninja-build p7zip-full python3 python3-pip python3-pyelftools python3-setuptools qemu-utils rsync squashfs-tools subversion swig unzip wget xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Cache OpenWrt dl
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE, 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-dl-

      - name: Cache ccache
        if: env.ENABLE_CCACHE == 'true'
        uses: actions/cache@v5
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE, 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-ccache-

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          if [ "$ENABLE_CCACHE" = "true" ]; then
            grep -q '^CONFIG_CCACHE=y' .config || echo 'CONFIG_CCACHE=y' >> .config
          fi

      - name: Download package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        env:
          CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
        run: |
          cd openwrt
          if [ "$ENABLE_CCACHE" = "true" ]; then
            ccache -M 20G
          fi
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          if [ "$ENABLE_CCACHE" = "true" ]; then
            ccache -s
          fi

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware artifacts
        if: env.UPLOAD_ARTIFACTS == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: OpenWrt_fast${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: |
            ${{ env.FIRMWARE }}/*combined*.img.gz
            ${{ env.FIRMWARE }}/*sha256sums*
          if-no-files-found: ignore
          compression-level: 0
